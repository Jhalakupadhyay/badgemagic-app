name: "MacOS Workflow"

inputs:
  VERSION_NAME:
    description: 'Version Name to be used for build'
    required: false
    default: '1.0.0'
  VERSION_CODE:
    description: 'Version Code to be used for build'
    required: true
    default: '1'

runs:
  using: "composite"
  steps:
    - name: Set up flutter
      uses: subosito/flutter-action@v2
      with:
        cache: true
    
    - name: Update Podfile
      shell: bash
      run: |
        cd ./macos
        flutter pub get
        pod install --repo-update
    
    - name: Build macOS App (No Code Signing for PRs)
      if: ${{ github.event_name == 'pull_request' }}
      shell: bash
      env:
        VERSION_NAME: ${{ inputs.VERSION_NAME }}
        VERSION_CODE: ${{ inputs.VERSION_CODE }}
      run: |
        flutter build macos --no-codesign --build-name $VERSION_NAME --build-number $VERSION_CODE

    - name: Build macOS App (With Code Signing)
      if: ${{ github.event_name == 'push' }}
      shell: bash
      env:
        VERSION_NAME: ${{ inputs.VERSION_NAME }}
        VERSION_CODE: ${{ inputs.VERSION_CODE }}
      run: |
        flutter build macos --build-name $VERSION_NAME --build-number $VERSION_CODE
    
    - name: upload app file
      uses: actions/upload-artifact@v4
      with:
        name: macos-app
        path: |
          build/macos/